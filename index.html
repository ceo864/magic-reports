const dd={month:"Березень",nextMonth:"Квітень",clientName:"Назва клієнта",budget:309608,revenue:2166768,purchases:398,avgCheck:5444,cpa:777,roas:7.0,prevBudget:300677,prevRevenue:2405417,prevPurchases:437,prevAvgCheck:5500,prevCpa:687,prevRoas:8.0,kpiBudget:300677,kpiRevenue:2405417,kpiPurchases:437,kpiAvgCheck:5500,kpiRoas:8.0,metaBudget:185000,metaRevenue:1350000,metaPurchases:245,metaRoas:7.3,googleBudget:95000,googleRevenue:620000,googlePurchases:120,googleRoas:6.5,tiktokBudget:29608,tiktokRevenue:196768,tiktokPurchases:33,tiktokRoas:6.6,impressions:1250000,clicks:42500,pageLoads:38000,contentViews:12000,addToCart:3200,initCheckout:1800,cpaW1:1200,cpaW2:950,cpaW3:780,cpaW4:680,roasW1:5.2,roasW2:6.1,roasW3:7.8,roasW4:8.5,products:[{name:"Road 2.0 (чорний)",revenue:680000,sales:98,roas:8.2},{name:"Holster",revenue:520000,sales:145,roas:9.1},{name:"Grif Tote",revenue:340000,sales:72,roas:6.8},{name:"Road 2.0 (хакі)",revenue:280000,sales:55,roas:5.9},{name:"Messenger Pro",revenue:190000,sales:28,roas:4.5}],creatives:[{name:"Grif Tote — формат",ctr:3.2,cpa:580,roas:9.4,purchases:45},{name:"Road 2.0 — UGC",ctr:2.8,cpa:640,roas:8.6,purchases:38},{name:"Holster — тактичний",ctr:2.5,cpa:720,roas:7.6,purchases:32}],tiktokCreatives:[{name:"Holster — розпакування",ctr:4.1,cpa:520,roas:8.2,purchases:18},{name:"Road 2.0 — outfit",ctr:3.5,cpa:680,roas:6.9,purchases:12},{name:"Grif Tote — ASMR",ctr:2.9,cpa:810,roas:5.4,purchases:8}],googleQueries:[{query:"купити сумку месенджер",clicks:1200,cost:18500,conv:42,cpa:440,roas:11.2},{query:"тактична сумка",clicks:980,cost:14200,conv:35,cpa:406,roas:9.8},{query:"сумка для ноутбука",clicks:850,cost:12800,conv:28,cpa:457,roas:8.5},{query:"кросбоді сумка чоловіча",clicks:720,cost:9600,conv:22,cpa:436,roas:9.1},{query:"holster сумка",clicks:540,cost:5200,conv:18,cpa:289,roas:14.2}],conclusions:[{title:"Ринок вирівнюється",text:"CPA стабілізувався у діапазоні 600-1000 грн."},{title:"Змінився локомотив",text:"Holster на 1 місці по продажах const f=n=>n==null?"0":Number(n).toLocaleString("uk-UA");
const pc=(a,b)=>b?Math.round(a/b*100):0;
const ch=(a,b)=>b?((a-b)/b*100).toFixed(1):"0";
const SK="magic_report_v3";
const ld=()=>{try{const s=localStorage.getItem(SK);if(!s)return null;const d=JSON.parse(s);return {...dd,...d,products:d.products||dd.products,creatives:d.creatives||dd.creatives,tiktokCreatives:d.tiktokCreatives||dd.tiktokCreatives,googleQueries:d.googleQueries||dd.googleQueries,conclusions:d.conclusions||dd.conclusions,plans:d.plans||dd.plans}}catch{return null}};
const sv=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};

function LnChart({vals,lbls,color,title}){
  const mx=Math.max(...vals),mn=Math.min(...vals),rng=mx-mn||1;
  const pd=28,w=300,h=160,ch2=h-pd*2;
  const pts=vals.map((v,i)=>({x:pd+i*(w-pd*2)/(vals.length-1),y:pd+(1-(v-mn)/rng)*ch2}));
  return(<div style={{background:W,borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
    {title&&<div style={{fontSize:13,fontWeight:700,color:I8,marginBottom:4}}>{title}</div>}
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%"}}>
      {[0,.25,.5,.75,1].map((t,i)=><line key={i} x1={pd} x2={w-pd} y1={pd+t*ch2} y2={pd+t*ch2} stroke={I0} strokeWidth="1"/>)}
      <polyline points={pts.map(p=>p.x+","+p.y).join(" ")} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="5" fill={color} stroke={W} strokeWidth="2"/><text x={p.x} y={p.y-12} textAnchor="middle" fontSize="10" fill={I8} fontWeight="700">{vals[i]%1?vals[i].toFixed(1):vals[i]}</text><text x={p.x} y={h-4} textAnchor="middle" fontSize="10" fill={I4}>{lbls[i]}</text></g>)}
    </svg>
  </div>);
}

function BrChart({data,colors}){
  const mx=Math.max(...data.flatMap(d=>d.v));
  return(<div style={{display:"flex",alignItems:"flex-end",gap:16,height:180,padding:"0 8px",borderBottom:`1px solid ${I1}`}}>
    {data.map((g,gi)=>(<div key={gi} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:160,width:"100%",justifyContent:"center"}}>
        {g.v.map((v,vi)=>(<div key={vi} style={{flex:1,maxWidth:30,height:`${mx?v/mx*100:0}%`,minHeight:2,background:colors[vi],borderRadius:"4px 4px 0 0",transition:"height 0.4s"}}/>))}
      </div>
      <div style={{fontSize:10,color:I4,marginTop:4}}>{g.l}</div>
    </div>))}
  </div>);
}

const TitleS=({d})=>(<div style={{background:GR,color:W,height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",padding:"48px 56px",borderRadius:20,position:"relative"}}><h1 style={{fontSize:44,fontWeight:900,letterSpacing:"-0.03em"}}>Звіт за {d.month.toLowerCase()}</h1><p style={{fontSize:20,fontWeight:300,marginTop:12,opacity:.9}}>{d.clientName}</p><p style={{position:"absolute",bottom:24,left:28,fontSize:12,opacity:.6,fontWeight:300}}>magic · advertise for e-commerce</p></div>);

const DashS=({d})=>{const m=[{l:"Бюджет",v:`₴${f(d.budget)}`,c:ch(d.budget,d.prevBudget),u:d.budget>=d.prevBudget},{l:"Оборот",v:`₴${f(d.revenue)}`,c:ch(d.revenue,d.prevRevenue),u:d.revenue>=d.prevRevenue},{l:"Покупок",v:f(d.purchases),c:ch(d.purchases,d.prevPurchases),u:d.purchases>=d.prevPurchases},{l:"ROAS",v:d.roas?.toFixed(1),c:ch(d.roas,d.prevRoas),u:d.roas>=d.prevRoas},{l:"Ср. чек",v:`₴${f(d.avgCheck)}`,c:ch(d.avgCheck,d.prevAvgCheck),u:d.avgCheck>=d.prevAvgCheck},{l:"CPA",v:`₴${f(d.cpa)}`,c:ch(d.cpa,d.prevCpa),u:d.cpa<=d.prevCpa}];return(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={B}>Загальний дашборд</H2><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>{m.map((x,i)=>(<div key={i} style={{background:W,borderRadius:14,padding:"20px 22px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{fontSize:24,fontWeight:900,color:I8}}>{x.v}</div><div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><span style={{fontSize:13,color:I4,fontWeight:300}}>{x.l}</span><span style={{fontSize:12,fontWeight:700,color:x.u?OK:NG}}>{x.u?"↑":"↓"} {x.c>0?"+":""}{x.c}%</span></div></div>))}</div><p style={{fontSize:11,color:I2,marginTop:20,fontWeight:300}}>Порівняння з попереднім місяцем</p></div>)};

const KpiS=({d})=>{const k=[{n:"Інвестиції",p:d.kpiBudget,fc:d.budget,s:" грн"},{n:"Оборот",p:d.kpiRevenue,fc:d.revenue,s:" грн"},{n:"Ср. чек",p:d.kpiAvgCheck,fc:d.avgCheck,s:" грн"},{n:"ROAS",p:d.kpiRoas,fc:d.roas,s:"",dc:1},{n:"Замовлень",p:d.kpiPurchases,fc:d.purchases,s:""}];return(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={P}>Виконання KPI</H2><div style={{display:"flex",flexDirection:"column",gap:14}}>{k.map((x,i)=>{const p2=x.dc?(x.p?Math.round(x.fc/x.p*100):0):pc(x.fc,x.p);const c=p2>=100?OK:p2>=90?B:NG;return(<div key={i}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:14,fontWeight:700,color:I8}}>{x.n}</span><div style={{display:"flex",gap:16}}><span style={{fontSize:12,color:I4,fontWeight:300}}>План: {x.dc?x.p:f(x.p)}{x.s} / Факт: {x.dc?x.fc?.toFixed(1):f(x.fc)}{x.s}</span><span style={{fontSize:14,fontWeight:700,color:c,minWidth:44,textAlign:"right"}}>{p2}%</span></div></div><div style={{height:10,background:"#E8E8F0",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(p2,100)}%`,background:c,borderRadius:5,transition:"width 0.4s"}}/></div></div>)})}</div></div>)};

const ChS=({d})=>{const chs=[{nm:"Meta Ads",b:d.metaBudget,r:d.metaRevenue,p:d.metaPurchases,rs:d.metaRoas},{nm:"Google Ads",b:d.googleBudget,r:d.googleRevenue,p:d.googlePurchases,rs:d.googleRoas},{nm:"TikTok Ads",b:d.tiktokBudget,r:d.tiktokRevenue,p:d.tiktokPurchases,rs:d.tiktokRoas}];return(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={B}>Розбивка по каналах</H2><div style={{display:"flex",gap:20,height:"calc(100% - 80px)"}}><div style={{flex:"1 1 55%",background:W,borderRadius:14,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{display:"flex",gap:16,marginBottom:8,justifyContent:"center"}}><span style={{fontSize:11,color:I4,display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:B,display:"inline-block"}}/>Бюджет</span><span style={{fontSize:11,color:I4,display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:P,display:"inline-block"}}/>Оборот</span></div><BrChart data={chs.map(c=>({l:c.nm.split(" ")[0],v:[c.b,c.r]}))} colors={[B,P]}/></div><div style={{flex:"1 1 40%",display:"flex",flexDirection:"column",gap:12}}>{chs.map((c,i)=>(<div key={i} style={{background:W,borderRadius:14,padding:"16px 18px",flex:1,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{fontSize:14,fontWeight:700,color:I8,marginBottom:6}}>{c.nm}</div><div style={{fontSize:12,color:I4,fontWeight:300,lineHeight:1.6}}>Бюджет: ₴{f(c.b)}<br/>ROAS: {c.rs} · Покупок: {c.p}</div></div>))}</div></div></div>)};

const FnS=({d})=>{const r=(a,b)=>b?((a/b)*100).toFixed(1):0;const st=[{l:"Покази",v:d.impressions,p:"100%",w:100},{l:"Кліки",v:d.clicks,p:`${r(d.clicks,d.impressions)}% CTR`,w:88},{l:"Завантаження сторінки",v:d.pageLoads,p:`${r(d.pageLoads,d.clicks)}%`,w:76},{l:"Перегляд контенту",v:d.contentViews,p:`${r(d.contentViews,d.pageLoads)}%`,w:64},{l:"Додано в кошик",v:d.addToCart,p:`${r(d.addToCart,d.contentViews)}%`,w:52},{l:"Ініціація замовлення",v:d.initCheckout,p:`${r(d.initCheckout,d.addToCart)}%`,w:40},{l:"Покупка",v:d.purchases,p:`${r(d.purchases,d.initCheckout)}%`,w:28}];const cs=["#38A0FF","#4DA3FF","#62A6FF","#7A9BFF","#8B8EFF","#9D82FF","#AA7AFF"];const cr=d.clicks?((d.purchases/d.clicks)*100).toFixed(2):0;return(<div style={{background:I0,height:"100%",padding:"32px 40px",borderRadius:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",margin:"0 0 16px"}}><h2 style={{fontSize:26,fontWeight:900,color:I8}}>Воронка конверсії</h2><div style={{background:W,borderRadius:10,padding:"8px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:12,color:I4,fontWeight:300}}>Конверсія сайту</span><span style={{fontSize:22,fontWeight:900,background:GR,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{cr}%</span></div></div><div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>{st.map((s,i)=>(<div key={i} style={{width:`${s.w}%`,minWidth:180,background:cs[i],borderRadius:10,padding:"10px 16px",color:W}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,fontWeight:700}}>{s.l}</span><span style={{fontSize:13,fontWeight:700}}>{f(s.v)}</span></div><div style={{fontSize:10,opacity:.85,marginTop:1,fontWeight:300}}>{s.p}</div></div>))}</div></div>)};

const PrS=({d})=>{const t=(d.products||[]).reduce((a,p)=>a+p.revenue,0);return(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={B}>Топ-5 товарів</H2><div style={{background:W,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:B}}>{["Товар","Дохід","Продажів","ROAS","Частка"].map(h=><th key={h} style={{padding:"10px 16px",color:W,fontWeight:700,textAlign:"left"}}>{h}</th>)}</tr></thead><tbody>{(d.products||[]).map((p,i)=><tr key={i} style={{background:i%2?I0:W}}><td style={{padding:"10px 16px",fontWeight:500,color:I8}}>{p.name}</td><td style={{padding:"10px 16px",color:I8}}>₴{f(p.revenue)}</td><td style={{padding:"10px 16px",color:I8}}>{p.sales}</td><td style={{padding:"10px 16px",color:I8}}>{p.roas}</td><td style={{padding:"10px 16px",color:I8}}>{t?Math.round(p.revenue/t*100):0}%</td></tr>)}</tbody></table></div></div>)};

const H2=({children,accent})=>(<h2 style={{fontSize:26,fontWeight:900,color:I8,margin:"0 0 12px",display:"flex",alignItems:"center",gap:10}}>{accent&&<span style={{width:4,height:28,borderRadius:2,background:accent,flexShrink:0}}/>}{children}</h2>);

const CrCard=({c,i,format})=>(<div style={{flex:1,background:W,borderRadius:14,padding:"12px 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",display:"flex",flexDirection:"column"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:24,height:24,borderRadius:"50%",background:B,color:W,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div><div style={{fontSize:12,fontWeight:700,color:I8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div></div><div style={{background:I0,borderRadius:10,flex:1,minHeight:0,aspectRatio:format,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:I2,flexDirection:"column",gap:2,marginBottom:8}}><span>Скріншот</span><span style={{fontSize:9,opacity:.6}}>{format}</span></div><div style={{display:"flex",justifyContent:"space-between",gap:4}}>{[["CTR",c.ctr+"%"],["CPA","₴"+f(c.cpa)],["ROAS",c.roas],["Пок.",c.purchases]].map(([l,v])=><div key={l} style={{textAlign:"center",flex:1}}><div style={{fontSize:9,color:I4,fontWeight:300}}>{l}</div><div style={{fontSize:12,fontWeight:700,color:I8}}>{v}</div></div>)}</div></div>);

const TikCrS=({d})=>(<div style={{background:I0,height:"100%",padding:"28px 40px",borderRadius:20,display:"flex",flexDirection:"column"}}><H2 accent="#000000">Найкращі креативи · TikTok Ads</H2><div style={{display:"flex",gap:14,flex:1,minHeight:0}}>{(d.tiktokCreatives||[]).map((c,i)=><CrCard key={i} c={c} i={i} format="9/16"/>)}</div></div>);

const GoogQS=({d})=>(<div style={{background:I0,height:"100%",padding:"28px 40px",borderRadius:20}}><H2 accent="#34A853">Топ пошукових запитів · Google Ads</H2><div style={{background:W,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",marginTop:8}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:"#34A853"}}>{["Запит","Кліки","Витрати","Конв.","CPA","ROAS"].map(h=><th key={h} style={{padding:"10px 14px",color:W,fontWeight:700,textAlign:"left"}}>{h}</th>)}</tr></thead><tbody>{(d.googleQueries||[]).map((q,i)=><tr key={i} style={{background:i%2?I0:W}}><td style={{padding:"10px 14px",fontWeight:500,color:I8}}>{q.query}</td><td style={{padding:"10px 14px",color:I8}}>{f(q.clicks)}</td><td style={{padding:"10px 14px",color:I8}}>₴{f(q.cost)}</td><td style={{padding:"10px 14px",color:I8}}>{q.conv}</td><td style={{padding:"10px 14px",color:I8}}>₴{f(q.cpa)}</td><td style={{padding:"10px 14px",fontWeight:700,color:q.roas>=8?OK:I8}}>{q.roas}</td></tr>)}</tbody></table></div></div>);

const CoS=({d})=>(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={P}>Висновки</H2><div style={{display:"flex",flexDirection:"column",gap:14}}>{(d.conclusions||[]).map((c,i)=>(<div key={i} style={{background:W,borderRadius:14,padding:"18px 22px",display:"flex",gap:16,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{fontSize:26,fontWeight:900,color:B,minWidth:36}}>0{i+1}</div><div><div style={{fontSize:15,fontWeight:700,color:I8,marginBottom:4}}>{c.title}</div><div style={{fontSize:12,color:I4,fontWeight:300,lineHeight:1.5}}>{c.text}</div></div></div>))}</div></div>);

const PlS=({d})=>(<div style={{background:GR,height:"100%",padding:"36px 40px",borderRadius:20}}><h2 style={{fontSize:28,fontWeight:900,color:W,margin:"0 0 24px"}}>План на {d.nextMonth.toLowerCase()}</h2><div style={{display:"flex",flexDirection:"column",gap:14}}>{(d.plans||[]).map((p,i)=>(<div key={i} style={{background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"18px 22px",display:"flex",gap:16}}><div style={{fontSize:24,fontWeight:900,color:W,opacity:.8,minWidth:36}}>0{i+1}</div><div><div style={{fontSize:15,fontWeight:700,color:W,marginBottom:4}}>{p.title}</div><div style={{fontSize:12,color:W,opacity:.8,fontWeight:300,lineHeight:1.5}}>{p.text}</div></div></div>))}</div></div>);

const NkS=({d})=>{const it=[{l:"Бюджет",v:`₴${f(d.nextBudget)}`},{l:"Оборот",v:`₴${f(d.nextRevenue)}`},{l:"Покупок",v:""+d.nextPurchases},{l:"ROAS",v:d.nextRoas?.toFixed(1)},{l:"Ср. чек",v:`₴${f(d.nextAvgCheck)}`},{l:"CPA",v:`₴${f(d.nextCpa)}`}];return(<div style={{background:I0,height:"100%",padding:"36px 40px",borderRadius:20}}><H2 accent={B}>KPI на {d.nextMonth.toLowerCase()}</H2><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>{it.map((m,i)=>(<div key={i} style={{background:W,borderRadius:14,padding:"24px 22px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{fontSize:28,fontWeight:900,color:I8}}>{m.v}</div><div style={{fontSize:13,color:I4,marginTop:8,fontWeight:300}}>{m.l}</div></div>))}</div></div>)};

const EndS=()=>(<div style={{background:GR,height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:20,color:W}}><h1 style={{fontSize:48,fontWeight:900}}>Дякуємо</h1><p style={{fontSize:14,marginTop:8,opacity:.8,fontWeight:300}}>magic · advertise for e-commerce</p></div>);

/* Form helpers */
function Fd({label:lb,value:vl,onChange:oc,type:tp="number",small:sm}){return(<div style={{flex:sm?"0 0 48%":1}}><label style={{fontSize:11,color:I4,display:"block",marginBottom:3,fontWeight:500}}>{lb}</label><input type={tp} value={vl} onChange={e=>oc(tp==="number"?parseFloat(e.target.value)||0:e.target.value)} style={{width:"100%",padding:"7px 10px",border:`1px solid ${I1}`,borderRadius:8,fontSize:13,color:I8,background:W,boxSizing:"border-box"}}/></div>)}
function Sc({title:t,children:ch2,open:ini=false}){const[o,so]=useState(ini);return(<div style={{borderBottom:`1px solid ${I1}`}}><button onClick={()=>so(!o)} style={{width:"100%",padding:"12px 0",display:"flex",justifyContent:"space-between",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:I8}}>{t}<span style={{color:I4,transform:o?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▾</span></button>{o&&<div style={{paddingBottom:16,display:"flex",flexWrap:"wrap",gap:10}}>{ch2}</div>}</div>)}

function ejson(d){const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`report_${d.month}.json`;a.click();URL.revokeObjectURL(u)}
async function lscr(u){return new Promise((ok,no)=>{if(document.querySelector(`script[src="${u}"]`)){ok();return}const s=document.createElement("script");s.src=u;s.onload=ok;s.onerror=()=>no();document.head.appendChild(s)})}
async function dexp(el,ss,n,d,se){se(true);try{await lscr("https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js");await lscr("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js")}catch{alert("Потрібен інтернет для PPTX");se(false);return}const p=new PptxGenJS();p.layout="LAYOUT_16x9";for(let i=0;i<n;i++){ss(i);await new Promise(r=>setTimeout(r,900));const c=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:null});const s=p.addSlide();s.addImage({data:c.toDataURL("image/png"),x:0,y:0,w:10,h:5.625})}await p.writeFile({fileName:`${d.clientName}_${d.month}.pptx`.replace(/\s/g,"_")});se(false)}

const SL=[{n:"Титулка",C:TitleS},{n:"Дашборд",C:DashS},{n:"KPI",C:KpiS},{n:"Канали",C:ChS},{n:"Воронка",C:FnS},{n:"Тижні",C:WkS},{n:"Товари",C:PrS},{n:"Meta Ads",C:MetaCrS},{n:"TikTok Ads",C:TikCrS},{n:"Google Ads",C:GoogQS},{n:"Висновки",C:CoS},{n:"План",C:PlS},{n:"KPI далі",C:NkS},{n:"Закриття",C:EndS}];

function App(){
  const[data,setData]=useState(()=>ld()||dd);
  const[sl,setSl]=useState(0);
  const[sf,setSf]=useState(true);
  const[ex,setEx]=useState(false);
  const fr=useRef(),sr=useRef();
  const up=(k,v)=>{const n={...data,[k]:v};setData(n);sv(n)};
  const ua=(a,i,k,v)=>{const c=[...data[a]];c[i]={...c[i],[k]:v};const n={...data,[a]:c};setData(n);sv(n)};
  const ij=e=>{const fl=e.target.files[0];if(!fl)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setData(d);sv(d)}catch{alert("Bad JSON")}};r.readAsText(fl)};
  const SC=SL[sl].C;
  return(<div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
    {sf&&<div style={{width:360,borderRight:`1px solid ${I1}`,background:W,overflowY:"auto",flexShrink:0}}>
      <div style={{padding:"14px 20px",borderBottom:`1px solid ${I1}`,position:"sticky",top:0,background:W,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:8,background:GR,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:W,fontSize:14,fontWeight:900}}>m</span></div><span style={{fontSize:14,fontWeight:700,color:I8}}>Генератор звітів</span></div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          <button onClick={()=>ejson(data)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${I1}`,background:W,cursor:"pointer",fontSize:11,color:I8}}>Експорт JSON</button>
          <button onClick={()=>fr.current?.click()} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${I1}`,background:W,cursor:"pointer",fontSize:11,color:I8}}>Імпорт JSON</button>
          <button onClick={()=>{if(confirm("Скинути?")){setData(dd);sv(dd)}}} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${NG}33`,background:W,cursor:"pointer",fontSize:11,color:NG}}>Скинути</button>
          <input ref={fr} type="file" accept=".json" onChange={ij} style={{display:"none"}}/>
          <button onClick={()=>dexp(sr.current,setSl,SL.length,data,setEx)} disabled={ex} style={{padding:"6px 10px",borderRadius:8,border:"none",background:ex?I2:GR,cursor:ex?"wait":"pointer",fontSize:11,color:W,fontWeight:700,width:"100%",marginTop:4}}>{ex?"Генерую...":"Завантажити PPTX"}</button>
        </div>
      </div>
      <div style={{padding:"0 20px"}}>
        <Sc title="Загальне" open={true}><Fd label="Місяць" value={data.month} onChange={v=>up("month",v)} type="text"/><Fd label="Наступний" value={data.nextMonth} onChange={v=>up("nextMonth",v)} type="text"/><Fd label="Клієнт" value={data.clientName} onChange={v=>up("clientName",v)} type="text"/></Sc>
        <Sc title="Поточний місяць" open={true}><Fd label="Бюджет" value={data.budget} onChange={v=>up("budget",v)} small/><Fd label="Оборот" value={data.revenue} onChange={v=>up("revenue",v)} small/><Fd label="Покупок" value={data.purchases} onChange={v=>up("purchases",v)} small/><Fd label="ROAS" value={data.roas} onChange={v=>up("roas",v)} small/><Fd label="Ср. чек" value={data.avgCheck} onChange={v=>up("avgCheck",v)} small/><Fd label="CPA" value={data.cpa} onChange={v=>up("cpa",v)} small/></Sc>
        <Sc title="Попередній місяць"><Fd label="Бюджет" value={data.prevBudget} onChange={v=>up("prevBudget",v)} small/><Fd label="Оборот" value={data.prevRevenue} onChange={v=>up("prevRevenue",v)} small/><Fd label="Покупок" value={data.prevPurchases} onChange={v=>up("prevPurchases",v)} small/><Fd label="ROAS" value={data.prevRoas} onChange={v=>up("prevRoas",v)} small/><Fd label="Ср. чек" value={data.prevAvgCheck} onChange={v=>up("prevAvgCheck",v)} small/><Fd label="CPA" value={data.prevCpa} onChange={v=>up("prevCpa",v)} small/></Sc>
        <Sc title="KPI-план"><Fd label="Бюджет" value={data.kpiBudget} onChange={v=>up("kpiBudget",v)} small/><Fd label="Оборот" value={data.kpiRevenue} onChange={v=>up("kpiRevenue",v)} small/><Fd label="Покупок" value={data.kpiPurchases} onChange={v=>up("kpiPurchases",v)} small/><Fd label="ROAS" value={data.kpiRoas} onChange={v=>up("kpiRoas",v)} small/><Fd label="Ср. чек" value={data.kpiAvgCheck} onChange={v=>up("kpiAvgCheck",v)} small/></Sc>
        <Sc title="Meta Ads"><Fd label="Бюджет" value={data.metaBudget} onChange={v=>up("metaBudget",v)} small/><Fd label="Оборот" value={data.metaRevenue} onChange={v=>up("metaRevenue",v)} small/><Fd label="Покупок" value={data.metaPurchases} onChange={v=>up("metaPurchases",v)} small/><Fd label="ROAS" value={data.metaRoas} onChange={v=>up("metaRoas",v)} small/></Sc>
        <Sc title="Google Ads"><Fd label="Бюджет" value={data.googleBudget} onChange={v=>up("googleBudget",v)} small/><Fd label="Оборот" value={data.googleRevenue} onChange={v=>up("googleRevenue",v)} small/><Fd label="Покупок" value={data.googlePurchases} onChange={v=>up("googlePurchases",v)} small/><Fd label="ROAS" value={data.googleRoas} onChange={v=>up("googleRoas",v)} small/></Sc>
        <Sc title="TikTok Ads"><Fd label="Бюджет" value={data.tiktokBudget} onChange={v=>up("tiktokBudget",v)} small/><Fd label="Оборот" value={data.tiktokRevenue} onChange={v=>up("tiktokRevenue",v)} small/><Fd label="Покупок" value={data.tiktokPurchases} onChange={v=>up("tiktokPurchases",v)} small/><Fd label="ROAS" value={data.tiktokRoas} onChange={v=>up("tiktokRoas",v)} small/></Sc>
        <Sc title="Воронка"><Fd label="Покази" value={data.impressions} onChange={v=>up("impressions",v)} small/><Fd label="Кліки" value={data.clicks} onChange={v=>up("clicks",v)} small/><Fd label="Завант. сторінки" value={data.pageLoads} onChange={v=>up("pageLoads",v)} small/><Fd label="Перегляд контенту" value={data.contentViews} onChange={v=>up("contentViews",v)} small/><Fd label="В кошик" value={data.addToCart} onChange={v=>up("addToCart",v)} small/><Fd label="Ініціація замовл." value={data.initCheckout} onChange={v=>up("initCheckout",v)} small/></Sc>
        <Sc title="CPA тижні"><Fd label="Тиж 1" value={data.cpaW1} onChange={v=>up("cpaW1",v)} small/><Fd label="Тиж 2" value={data.cpaW2} onChange={v=>up("cpaW2",v)} small/><Fd label="Тиж 3" value={data.cpaW3} onChange={v=>up("cpaW3",v)} small/><Fd label="Тиж 4" value={data.cpaW4} onChange={v=>up("cpaW4",v)} small/></Sc>
        <Sc title="ROAS тижні"><Fd label="Тиж 1" value={data.roasW1} onChange={v=>up("roasW1",v)} small/><Fd label="Тиж 2" value={data.roasW2} onChange={v=>up("roasW2",v)} small/><Fd label="Тиж 3" value={data.roasW3} onChange={v=>up("roasW3",v)} small/><Fd label="Тиж 4" value={data.roasW4} onChange={v=>up("roasW4",v)} small/></Sc>
        <Sc title="Товари">{(data.products||[]).map((p,i)=>(<div key={i} style={{width:"100%",padding:"8px 0",borderTop:i?`1px solid ${I0}`:"none"}}><div style={{fontSize:11,fontWeight:700,color:B,marginBottom:6}}>#{i+1}</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}><Fd label="Назва" value={p.name} onChange={v=>ua("products",i,"name",v)} type="text"/><Fd label="Дохід" value={p.revenue} onChange={v=>ua("products",i,"revenue",v)} small/><Fd label="Продажів" value={p.sales} onChange={v=>ua("products",i,"sales",v)} small/><Fd label="ROAS" value={p.roas} onChange={v=>ua("products",i,"roas",v)} small/></div></div>))}</Sc>
        <Sc title="Креативи Meta">{(data.creatives||[]).map((c,i)=>(<div key={i} style={{width:"100%",padding:"8px 0",borderTop:i?`1px solid ${I0}`:"none"}}><div style={{fontSize:11,fontWeight:700,color:"#1877F2",marginBottom:6}}>#{i+1}</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}><Fd label="Назва" value={c.name} onChange={v=>ua("creatives",i,"name",v)} type="text"/><Fd label="CTR%" value={c.ctr} onChange={v=>ua("creatives",i,"ctr",v)} small/><Fd label="CPA" value={c.cpa} onChange={v=>ua("creatives",i,"cpa",v)} small/><Fd label="ROAS" value={c.roas} onChange={v=>ua("creatives",i,"roas",v)} small/><Fd label="Покупок" value={c.purchases} onChange={v=>ua("creatives",i,"purchases",v)} small/></div></div>))}</Sc>
        <Sc title="Креативи TikTok">{(data.tiktokCreatives||[]).map((c,i)=>(<div key={i} style={{width:"100%",padding:"8px 0",borderTop:i?`1px solid ${I0}`:"none"}}><div style={{fontSize:11,fontWeight:700,color:I8,marginBottom:6}}>#{i+1}</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}><Fd label="Назва" value={c.name} onChange={v=>ua("tiktokCreatives",i,"name",v)} type="text"/><Fd label="CTR%" value={c.ctr} onChange={v=>ua("tiktokCreatives",i,"ctr",v)} small/><Fd label="CPA" value={c.cpa} onChange={v=>ua("tiktokCreatives",i,"cpa",v)} small/><Fd label="ROAS" value={c.roas} onChange={v=>ua("tiktokCreatives",i,"roas",v)} small/><Fd label="Покупок" value={c.purchases} onChange={v=>ua("tiktokCreatives",i,"purchases",v)} small/></div></div>))}</Sc>
        <Sc title="Запити Google">{(data.googleQueries||[]).map((q,i)=>(<div key={i} style={{width:"100%",padding:"8px 0",borderTop:i?`1px solid ${I0}`:"none"}}><div style={{fontSize:11,fontWeight:700,color:"#34A853",marginBottom:6}}>#{i+1}</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}><Fd label="Запит" value={q.query} onChange={v=>ua("googleQueries",i,"query",v)} type="text"/><Fd label="Кліки" value={q.clicks} onChange={v=>ua("googleQueries",i,"clicks",v)} small/><Fd label="Витрати" value={q.cost} onChange={v=>ua("googleQueries",i,"cost",v)} small/><Fd label="Конверсії" value={q.conv} onChange={v=>ua("googleQueries",i,"conv",v)} small/><Fd label="CPA" value={q.cpa} onChange={v=>ua("googleQueries",i,"cpa",v)} small/><Fd label="ROAS" value={q.roas} onChange={v=>ua("googleQueries",i,"roas",v)} small/></div></div>))}</Sc>
        <Sc title="Висновки">{(data.conclusions||[]).map((c,i)=>(<div key={i} style={{width:"100%",padding:"8px 0"}}><Fd label="Заголовок" value={c.title} onChange={v=>ua("conclusions",i,"title",v)} type="text"/><textarea value={c.text} onChange={e=>ua("conclusions",i,"text",e.target.value)} style={{width:"100%",padding:"7px 10px",border:`1px solid ${I1}`,borderRadius:8,fontSize:12,color:I8,resize:"vertical",minHeight:40,fontFamily:"inherit",boxSizing:"border-box",marginTop:6}}/></div>))}</Sc>
        <Sc title="Плани">{(data.plans||[]).map((p,i)=>(<div key={i} style={{width:"100%",padding:"8px 0"}}><Fd label="Заголовок" value={p.title} onChange={v=>ua("plans",i,"title",v)} type="text"/><textarea value={p.text} onChange={e=>ua("plans",i,"text",e.target.value)} style={{width:"100%",padding:"7px 10px",border:`1px solid ${I1}`,borderRadius:8,fontSize:12,color:I8,resize:"vertical",minHeight:40,fontFamily:"inherit",boxSizing:"border-box",marginTop:6}}/></div>))}</Sc>
        <Sc title="KPI далі"><Fd label="Бюджет" value={data.nextBudget} onChange={v=>up("nextBudget",v)} small/><Fd label="Оборот" value={data.nextRevenue} onChange={v=>up("nextRevenue",v)} small/><Fd label="Покупок" value={data.nextPurchases} onChange={v=>up("nextPurchases",v)} small/><Fd label="ROAS" value={data.nextRoas} onChange={v=>up("nextRoas",v)} small/><Fd label="Ср. чек" value={data.nextAvgCheck} onChange={v=>up("nextAvgCheck",v)} small/><Fd label="CPA" value={data.nextCpa} onChange={v=>up("nextCpa",v)} small/></Sc>
        <div style={{height:40}}/>
      </div>
    </div>}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 24px",borderBottom:`1px solid ${I1}`,background:W}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><button onClick={()=>setSf(!sf)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${I1}`,background:sf?I0:W,cursor:"pointer",fontSize:12,color:I8,fontWeight:500}}>{sf?"Сховати":"Форма"}</button><span style={{fontSize:13,color:I4}}>{sl+1} / {SL.length}</span></div>
        <div style={{display:"flex",gap:6}}><button onClick={()=>setSl(Math.max(0,sl-1))} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${I1}`,background:W,cursor:"pointer",opacity:sl===0?.4:1,fontSize:13,color:I8}}>←</button><button onClick={()=>setSl(Math.min(SL.length-1,sl+1))} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${I1}`,background:W,cursor:"pointer",opacity:sl===SL.length-1?.4:1,fontSize:13,color:I8}}>→</button></div>
      </div>
      <div style={{display:"flex",gap:6,padding:"10px 24px",overflowX:"auto",background:W,borderBottom:`1px solid ${I1}`}}>{SL.map((s,i)=><button key={i} onClick={()=>setSl(i)} style={{padding:"5px 12px",borderRadius:20,border:"none",background:i===sl?GR:I0,color:i===sl?W:I4,fontSize:11,fontWeight:i===sl?700:500,cursor:"pointer",whiteSpace:"nowrap"}}>{s.n}</button>)}</div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24,overflow:"auto",position:"relative"}}>
        <div ref={sr} style={{width:"100%",maxWidth:900,aspectRatio:"16/9"}}><SC d={data}/></div>
        {ex&&<div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:100}}><div style={{width:40,height:40,border:`3px solid ${I1}`,borderTopColor:B,borderRadius:"50%",animation:"spin .8s linear infinite"}}/><p style={{marginTop:16,fontSize:14,fontWeight:700,color:I8}}>Слайд {sl+1}/{SL.length}...</p></div>}
      </div>
    </div>
  </div>);
}
try{ReactDOM.createRoot(document.getElementById("root")).render(<App/>)}catch(e){document.getElementById("root").innerHTML='<div style="padding:40px"><h2 style="color:red">'+e.message+'</h2></div>'}
</script>
</body>
</html>
